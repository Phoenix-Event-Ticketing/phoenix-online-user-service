openapi: 3.0.3
info:
  title: Phoenix-Online User Service API
  description: |
    Authentication, authorization, and user identity for Phoenix-Online.
    Protected routes use `Authorization: Bearer <JWT>`. Tokens may be **user** tokens (`sub` = user id, `permissions` claim)
    or **service** tokens (`typ: service`, `sub` = service id; allowed permissions are resolved from `SERVICE_REGISTRY` on the server).
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local

paths:
  /users/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                name: { type: string }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: string }
                  email: { type: string }
                  message: { type: string }
        '409':
          description: Email already registered

  /users/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, example: Bearer }
                  expires_in: { type: integer }
        '401':
          description: Invalid credentials

  /users/{id}:
    get:
      summary: Get user profile
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  email: { type: string }
                  name: { type: string }
                  role: { type: string }
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — insufficient permissions (e.g. not own profile and not VIEW_USERS; service without VIEW_USERS)
        '404':
          description: User not found
    put:
      summary: Update profile
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200':
          description: Updated profile
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — not own profile without MANAGE_USERS, or service token
        '404':
          description: User not found

  /users/{id}/role:
    put:
      summary: Assign role
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [USER, ORGANIZER, ADMIN] }
      responses:
        '200':
          description: Updated profile with new role
        '400':
          description: Invalid role
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — missing ASSIGN_ROLE
        '404':
          description: User not found

  /users/batch:
    post:
      summary: Batch user lookup (for other services)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_ids]
              properties:
                user_ids:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — user needs BATCH_USER_LOOKUP, VIEW_USERS, or MANAGE_USERS; service needs BATCH_USER_LOOKUP in SERVICE_REGISTRY

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        User JWT or service JWT (`typ: service`). Service permissions are defined by the `SERVICE_REGISTRY` environment map.
